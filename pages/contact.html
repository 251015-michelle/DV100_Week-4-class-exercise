<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width-device-width, initial-scale-1.0">
    <meta name="keywords" content="template, initial setup, html, css, links, futureUse">
    <meta name="author" content="Michelle van Vuuren 251015">

    <title>HTML Template</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">

</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">
            <p>StudySpace</p>
        </div>
        <div class="navLinks">
            <a href="../index.html">Home</a>
            <a href="about.html">About</a>
            <a href="#">Contact</a>
        </div>
    </nav>
</header>

<section class="contactSection">
    <div class="contactContainer">
        <div class="contactInfo">
            <h1>Contact Us</h1>
            <p>If you would like to learn more about StudySpace or attend one of our student productivity workshops, please get in touch with us.</p>
            <p>You can also visit our campus location shown on this map:</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3589.3171164933447!2d28.206838575741404!3d-25.89194377727023!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e956608911ce097%3A0x519896b4b6eda40a!2sOpen%20Window%20-%20Centurion!5e0!3m2!1sen!2sza!4v1773837790083!5m2!1sen!2sza" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div class="contactForm">
            <form>
                <div class="formElement">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="enter your name" required />
                </div>
                <div class="formElement">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="enter your email" required />
                </div>
                <div class="formElement">
                    <label for="students">Number of Students</label>
                    <input type="number" id="students" name="students" min="1" max="50" /> 
                </div>
                <div class="formElement">
                    <label for="visit">Preferred visit date</label>
                    <input type="date" id="visit" name="visit" />
                </div>
                <div class="formElement">
                    <label for="topic">Select Topic Of Interest</label>
                    <select id="topic" name="topic">
                        <option value="">Select an Option</option>
                        <option value="productivity">Student Productivity</option>
                        <option value="organization">Organizational tools</option>
                        <option value="workshop">Workshop</option>
                    </select>
                </div>

                <div class="formElement">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="Write your message here..." required></textarea>
                </div>

                <button>Submit</button>


            </form>

        </div>



    </div>


</section>





<footer>
    <p>&copy StudySpace 2026</p>
</footer>
</body>
</html>
